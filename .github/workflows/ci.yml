name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # линтинг markdown
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g markdownlint-cli
      - run: markdownlint '**/*.md' --config .markdownlint.yml

  # линтинг go-сервиса auth
  go-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache-dependency-path: auth/go.sum
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Run go vet
        run: go vet ./...
      - name: Run staticcheck
        run: staticcheck ./...

  # тесты go-сервиса auth
  go-test:
    runs-on: ubuntu-latest
    needs: go-lint
    defaults:
      run:
        working-directory: ./auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache-dependency-path: auth/go.sum
      - name: Run Go tests
        run: go test -v ./...

  # линтинг fastapi-сервиса recipe
  python-lint:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('recipe/requirements.txt, recipe/pyproject.toml') != '' }}
    defaults:
      run:
        working-directory: ./recipe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            recipe/requirements.txt
            recipe/pyproject.toml
      - run: pip install ruff
      - name: Ruff check (only critical errors)
        run: ruff check . --select=E,F,W --ignore=E501

  # тесты fastapi-сервиса recipe
  python-test:
    runs-on: ubuntu-latest
    needs: python-lint
    defaults:
      run:
        working-directory: ./recipe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            recipe/requirements.txt
            recipe/pyproject.toml
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Pytest
        run: pytest -v app/

  # проверка сборки docker-образов
  docker-build:
    runs-on: ubuntu-latest
    needs: [markdown, go-lint, python-lint, go-test, python-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build auth image
        run: docker build --pull -t cook-book/auth:ci ./auth
      - name: Build recipe image
        run: docker build --pull -t cook-book/recipe:ci ./recipe
      - name: Build frontend image
        run: docker build --pull -t cook-book/frontend:ci ./frontend
