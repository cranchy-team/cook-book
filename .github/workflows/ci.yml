  # проверка сборки docker-образов (только существующих сервисов)
  docker-build:
    runs-on: ubuntu-latest
    needs: [markdown, go-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build auth image (if Dockerfile exists)
        run: |
          if [ -f auth/Dockerfile ]; then
            docker build --pull -t cook-book/auth:ci ./auth
          fi
